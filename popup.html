<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    width: 220px;
    padding: 14px;
    margin: 0;
    background: #121212;
    color: #fff;
  }
  h3 {
    margin: 0 0 10px;
    font-size: 14px;
    font-weight: 600;
  }
  .count {
    font-size: 32px;
    font-weight: 700;
    color: #1db954;
    line-height: 1;
  }
  .label {
    font-size: 12px;
    color: #b3b3b3;
    margin-top: 4px;
  }
  button {
    margin-top: 14px;
    width: 100%;
    padding: 7px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background: #282828;
    color: #fff;
    font-size: 12px;
  }
  button:hover {
    background: #333;
  }
</style>
</head>
<body>
  <h3>uSpot - Spotify Adblocker</h3>
  <div class="count" id="count">0</div>
  <div class="label">ad requests blocked</div>
  <button id="reset">Reset counter</button>
  <script src="popup.js"></script>
</body>
</html>
